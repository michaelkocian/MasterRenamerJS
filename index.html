<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Renamer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/tree.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/dialog.css">
</head>
<body>
    <div id="app">
        <header id="toolbar" class="toolbar">
            <div class="toolbar-group">
                <button id="btn-open-folder" class="toolbar-btn" title="Open Folder">
                    📂 Open Folder
                </button>
                <select id="sel-path-mode" class="toolbar-select" title="Name display mode">
                    <option value="name">File Name</option>
                    <option value="relative">Relative Path</option>
                    <option value="full">Full Path</option>
                </select>
                <select id="sel-file-scope" class="toolbar-select" title="Which files to show">
                    <option value="folder">Folder Files</option>
                    <option value="files-and-folders">Files &amp; Folders</option>
                    <option value="recursive" selected>All Recursive</option>
                </select>
                <select id="sel-display-mode" class="toolbar-select" title="Change display style">
                    <option value="green-red">Added + Removed</option>
                    <option value="green">Added Only</option>
                    <option value="green-line">Added + Delete Line</option>
                    <option value="red">Removed Only</option>
                    <option value="new">New Name</option>
                    <option value="old">Old Name</option>
                </select>
            </div>
            <div class="toolbar-group">
                <button id="btn-search-toggle" class="toolbar-btn" title="Find &amp; Replace">
                    🔍 Search
                </button>
                <button id="btn-undo-all" class="toolbar-btn toolbar-btn-secondary" title="Undo all changes">
                    ↩ Undo All
                </button>
                <button id="btn-compare" class="toolbar-btn" title="Compare changes before saving">
                    📋 Compare
                </button>
                <button id="btn-save" class="toolbar-btn toolbar-btn-primary" title="Save and rename files">
                    💾 Save
                </button>
                <button id="btn-theme" class="toolbar-btn" title="Toggle light/dark mode">
                    🌙
                </button>
            </div>
        </header>

        <div id="search-panel" class="search-panel hidden">
            <div class="search-panel-row">
                <label class="toolbar-label">Find:</label>
                <input type="text" id="regex-find" class="toolbar-input search-input" placeholder="Search pattern...">
                <label class="toolbar-checkbox">
                    <input type="checkbox" id="chk-regex-mode" checked>
                    <span>Regex</span>
                </label>
                <label class="toolbar-checkbox">
                    <input type="checkbox" id="chk-case-sensitive">
                    <span>Aa</span>
                </label>
                <label class="toolbar-label">Replace:</label>
                <input type="text" id="regex-replace" class="toolbar-input search-input" placeholder="Replacement...">
                <button id="btn-apply-regex" class="toolbar-btn" title="Apply regex rename">
                    Apply
                </button>
                <button id="btn-clear-regex" class="toolbar-btn toolbar-btn-secondary" title="Clear search">
                    Clear
                </button>
                <span id="search-match-info" class="search-match-info"></span>
            </div>
        </div>

        <main class="main-layout">
            <aside id="folder-tree" class="folder-tree-panel">
                <div class="tree-header">Explorer</div>
                <div id="tree-container" class="tree-container"></div>
            </aside>

            <div class="splitter" id="splitter"></div>

            <section id="editor-panel" class="editor-panel">
                <div class="editor-header">
                    <span id="editor-file-count" class="editor-file-count"></span>
                    <span id="editor-selection-info" class="editor-selection-info"></span>
                </div>
                <div id="editor-scroll" class="editor-scroll">
                    <div id="line-numbers" class="line-numbers"></div>
                    <div id="editor" class="editor" tabindex="0"></div>
                </div>
            </section>
        </main>

        <div id="compare-dialog" class="dialog-overlay hidden">
            <div class="dialog dialog-fullscreen">
                <div class="dialog-header">
                    <h2>Compare Changes</h2>
                    <div class="dialog-settings">
                        <select id="sel-compare-path" class="toolbar-select" title="Name display in dialog">
                            <option value="name">File Name</option>
                            <option value="relative">Relative Path</option>
                            <option value="full">Full Path</option>
                        </select>
                        <select id="sel-compare-display" class="toolbar-select" title="Diff display style">
                            <option value="green-red">Added + Removed</option>
                            <option value="green">Added Only</option>
                            <option value="green-line">Added + Delete Line</option>
                            <option value="red">Removed Only</option>
                            <option value="new">New Name</option>
                            <option value="old">Old Name</option>
                        </select>
                    </div>
                    <button id="btn-close-dialog" class="dialog-close" title="Close">✕</button>
                </div>
                <div id="compare-content" class="compare-content"></div>
                <div class="dialog-footer">
                    <span id="compare-summary" class="compare-summary"></span>
                    <button id="btn-dialog-cancel" class="toolbar-btn toolbar-btn-secondary">Cancel</button>
                    <button id="btn-dialog-save" class="toolbar-btn toolbar-btn-primary">💾 Save Changes</button>
                </div>
            </div>
        </div>

        <div id="status-bar" class="status-bar">
            <span id="status-message">Ready — Open a folder to begin</span>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
